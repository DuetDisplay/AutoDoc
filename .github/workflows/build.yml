name: Build & Release

on:
  push:
    branches:
      # Add a developer branch here when you want test artifacts from CI.
      - codex/single-instance-installed-copy
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_platform:
        description: Release target to build and publish
        required: false
        default: mac
        type: choice
        options:
          - mac
          - all
      release_tag:
        description: Tag name for release assets (leave blank for non-release runs)
        required: false
        default: ''
        type: string

jobs:
  build-mac:
    if: github.event_name == 'push' || inputs.release_platform == 'mac' || inputs.release_platform == 'all'
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      AUTODOC_SENTRY_DSN: ${{ secrets.AUTODOC_SENTRY_DSN }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DD_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.DD_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.DD_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build macOS release (signed + notarized)
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        env:
          APPLE_ID: ${{ secrets.DD_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DD_APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DD_APPLE_TEAM }}
        run: npm run build:mac

      - name: Build macOS artifacts (signed, no notarization)
        if: github.event_name == 'push' && github.ref_type == 'branch'
        run: npm run build && npx electron-builder --mac --publish never --config.mac.notarize=false

      - name: Upload macOS artifacts
        if: github.event_name == 'push' && github.ref_type == 'branch' && success()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-macos-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS release assets
        if: (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')) && success()
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  build-win:
    if: github.event_name == 'push' || inputs.release_platform == 'all'
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      AUTODOC_SENTRY_DSN: ${{ secrets.AUTODOC_SENTRY_DSN }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Materialize DigiCert client certificate
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: pwsh
        env:
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.DD_SM_CLIENT_CERT_FILE_B64 }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'Certificate_pkcs12.p12'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64))
          "SM_CLIENT_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup DigiCert signing tools
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: digicert/ssm-code-signing@v1.0.0
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}

      - name: Expose DigiCert tool paths
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: pwsh
        run: |
          $smctlCommand = Get-Command smctl.exe -ErrorAction SilentlyContinue
          if (-not $smctlCommand) {
            $candidatePaths = @()

            if ($env:LOCALAPPDATA) {
              $candidatePaths += Join-Path $env:LOCALAPPDATA 'Temp\smtools-windows-x64\smctl.exe'
            }
            if ($env:ProgramFiles) {
              $candidatePaths += Join-Path $env:ProgramFiles 'DigiCert\DigiCert One Signing Manager Tools\smctl.exe'
            }
            if (${env:ProgramFiles(x86)}) {
              $candidatePaths += Join-Path ${env:ProgramFiles(x86)} 'DigiCert\DigiCert One Signing Manager Tools\smctl.exe'
            }

            $smctlPath = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
            if (-not $smctlPath) {
              throw 'smctl.exe was not found on PATH or in the standard DigiCert install locations.'
            }
          } else {
            $smctlPath = $smctlCommand.Source
          }

          $smToolsDir = Split-Path -Parent $smctlPath
          $smToolsDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SMCTL_PATH=$smctlPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check DigiCert signing health
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: pwsh
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ secrets.DD_SM_KEYPAIR_ALIAS }}
        run: |
          & $env:SMCTL_PATH healthcheck
          & $env:SMCTL_PATH windows certsync --keypair-alias=$env:SM_KEYPAIR_ALIAS --store=system

      - name: Build Windows release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        env:
          REQUIRE_WINDOWS_SIGNING: 'true'
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ secrets.DD_SM_KEYPAIR_ALIAS }}
        run: npm run build:win

      - name: Verify Windows signatures
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: pwsh
        run: |
          $files = @(
            'dist\win-unpacked\autodoc.exe'
            'dist\win-unpacked\resources\app.asar.unpacked\native\win-meeting-detector\bin\win-meeting-detector.exe'
            'dist\autodoc-*.exe'
          )

          $resolvedFiles = @()
          foreach ($pattern in $files) {
            $resolvedFiles += Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
          }

          if (-not $resolvedFiles) {
            throw 'No Windows artifacts were found to verify.'
          }

          $failed = $false
          foreach ($file in ($resolvedFiles | Sort-Object FullName -Unique)) {
            $signature = Get-AuthenticodeSignature $file.FullName
            [pscustomobject]@{
              Path = $file.FullName
              Status = $signature.Status
              Signer = $signature.SignerCertificate.Subject
            } | Format-List

            if ($signature.Status -ne 'Valid') {
              $failed = $true
            }
          }

          if ($failed) {
            throw 'One or more Windows artifacts are not Authenticode-signed.'
          }

      - name: Build Windows artifacts
        if: github.event_name == 'push' && github.ref_type == 'branch'
        run: npm run build && npx electron-builder --win --publish never --config.win.forceCodeSigning=false

      - name: Upload Windows artifacts
        if: github.event_name == 'push' && github.ref_type == 'branch' && success()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-windows-${{ github.run_number }}
          path: |
            dist/*-setup.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows release assets
        if: (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')) && success()
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          path: |
            dist/*-setup.exe
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: >-
      ${{
        always() &&
        (
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        ) &&
        needs.build-mac.result == 'success' &&
        (
          startsWith(github.ref, 'refs/tags/') ||
          inputs.release_platform != 'all' ||
          needs.build-win.result == 'success'
        )
      }}
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win
    permissions:
      contents: write

    steps:
      - name: Download macOS release assets
        if: needs.build-mac.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-macos-${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          path: release-assets/mac

      - name: Download Windows release assets
        if: (startsWith(github.ref, 'refs/tags/') || inputs.release_platform == 'all') && needs.build-win.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: release-windows-${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
          path: release-assets/win

      - name: Publish curated GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
        run: |
          assets=(release-assets/mac/*)
          if [ -d release-assets/win ]; then
            assets+=(release-assets/win/*)
          fi

          if gh release view "$RELEASE_TAG" -R "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber -R "$GH_REPO"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --title "$RELEASE_TAG" -R "$GH_REPO"
          fi

      - name: Remove obsolete blockmap assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag != '' && inputs.release_tag || github.ref_name }}
        run: |
          release_json="$(gh api "repos/${GH_REPO}/releases/tags/${RELEASE_TAG}")"
          blockmap_ids="$(jq -r '.assets[] | select(.name | endswith(".blockmap")) | .id' <<<"$release_json")"

          if [ -z "$blockmap_ids" ]; then
            exit 0
          fi

          while IFS= read -r asset_id; do
            gh api --method DELETE "repos/${GH_REPO}/releases/assets/${asset_id}"
          done <<<"$blockmap_ids"
