name: Build & Release

on:
  push:
    branches:
      - main
      - pcPatchAndOnboarding
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Verify notarization credentials
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.DD_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DD_APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DD_APPLE_TEAM }}
        run: |
          echo "APPLE_ID is set: $( [ -n \"$APPLE_ID\" ] && echo 'yes' || echo 'NO - MISSING' )"
          echo "APPLE_APP_SPECIFIC_PASSWORD is set: $( [ -n \"$APPLE_APP_SPECIFIC_PASSWORD\" ] && echo 'yes' || echo 'NO - MISSING' )"
          echo "APPLE_TEAM_ID is set: $( [ -n \"$APPLE_TEAM_ID\" ] && echo 'yes' || echo 'NO - MISSING' )"
          echo "APPLE_TEAM_ID length: ${#APPLE_TEAM_ID}"
          echo "APPLE_ID first 3 chars: ${APPLE_ID:0:3}***"
          xcrun notarytool history --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" 2>&1 | head -5 || true

      - name: Build macOS release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CSC_LINK: ${{ secrets.DD_BUILD_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.DD_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.DD_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DD_APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DD_APPLE_TEAM }}
          GH_TOKEN: ${{ github.token }}
        run: npm run release:mac

      - name: Build macOS artifacts
        if: github.ref_type == 'branch'
        run: npm run build:mac

      - name: Upload macOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-macos-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn
          retention-days: 14

  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Build Windows release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run release:win

      - name: Build Windows artifacts
        if: github.ref_type == 'branch'
        run: npm run build:win

      - name: Upload Windows artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-windows-${{ github.ref_name }}
          path: |
            dist/*-setup.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn
          retention-days: 14
