name: Build & Release

# SECURITY: Do not add pull_request — this workflow uses signing secrets.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_platform:
        description: Release target to build and publish
        required: false
        default: mac
        type: choice
        options:
          - mac
          - windows
          - all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-mac-ci:
    if: >-
      ${{
        (github.event_name == 'push' && github.ref_type == 'branch') ||
        (github.event_name == 'workflow_dispatch' && (inputs.release_platform == 'mac' || inputs.release_platform == 'all'))
      }}
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      AUTODOC_SENTRY_DSN: ${{ secrets.AUTODOC_SENTRY_DSN }}
      AUTODOC_SENTRY_QA_PROBE: ${{ github.repository == 'DuetDisplay/AutoDoc-Internal' && '1' || '' }}
      AUTODOC_OFFICIAL_BUILD: ${{ github.repository == 'DuetDisplay/AutoDoc' && '1' || '' }}
      AUTODOC_AUTH_WORKER_URL: ${{ vars.AUTODOC_AUTH_WORKER_URL }}
      AUTODOC_MACOS_WHISPER_RUNTIME_ASSET_BASE_URL: ${{ vars.AUTODOC_MACOS_WHISPER_RUNTIME_ASSET_BASE_URL }}
      AUTODOC_WINDOWS_TRANSCRIPTION_ASSET_BASE_URL: ${{ vars.AUTODOC_WINDOWS_TRANSCRIPTION_ASSET_BASE_URL }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Build macOS CI artifacts (unsigned)
        run: npm run prepare:macos-mlx-runtime && npm run build && npx electron-builder --mac --publish never --config.mac.notarize=false -c.mac.identity=null

      - name: Upload macOS artifacts
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: autodoc-macos-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 14

  build-mac-release:
    if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: macos-latest
    environment: release-signing
    permissions:
      contents: read
      actions: write
    env:
      AUTODOC_SENTRY_DSN: ${{ secrets.AUTODOC_SENTRY_DSN }}
      AUTODOC_SENTRY_QA_PROBE: ${{ github.repository == 'DuetDisplay/AutoDoc-Internal' && '1' || '' }}
      AUTODOC_OFFICIAL_BUILD: ${{ github.repository == 'DuetDisplay/AutoDoc' && '1' || '' }}
      AUTODOC_AUTH_WORKER_URL: ${{ vars.AUTODOC_AUTH_WORKER_URL }}
      AUTODOC_MACOS_WHISPER_RUNTIME_ASSET_BASE_URL: ${{ vars.AUTODOC_MACOS_WHISPER_RUNTIME_ASSET_BASE_URL }}
      AUTODOC_WINDOWS_TRANSCRIPTION_ASSET_BASE_URL: ${{ vars.AUTODOC_WINDOWS_TRANSCRIPTION_ASSET_BASE_URL }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          raw_tag="$RAW_TAG"
          release_tag="${raw_tag#refs/tags/}"
          release_version="${release_tag#v}"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DD_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.DD_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.DD_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build macOS release (signed + notarized)
        env:
          APPLE_ID: ${{ secrets.DD_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DD_APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DD_APPLE_TEAM }}
        run: |
          npm run prepare:macos-mlx-runtime
          npm run build
          npx electron-builder --mac --publish never "-c.extraMetadata.version=${{ steps.release_meta.outputs.release_version }}"

      - name: Verify macOS release artifacts (signature, entitlements, runtime)
        run: bash scripts/verify-macos-update-artifact.sh dist

      - name: Upload macOS release assets
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-macos-${{ steps.release_meta.outputs.release_tag }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  # Windows QA builds run on manual dispatch only; the signed release path stays
  # tag-gated and dormant until Windows ships publicly.
  build-win:
    if: github.event_name == 'workflow_dispatch' && (inputs.release_platform == 'windows' || inputs.release_platform == 'all')
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      AUTODOC_SENTRY_DSN: ${{ secrets.AUTODOC_SENTRY_DSN }}
      AUTODOC_SENTRY_QA_PROBE: ${{ github.repository == 'DuetDisplay/AutoDoc-Internal' && '1' || '' }}
      AUTODOC_OFFICIAL_BUILD: ${{ github.repository == 'DuetDisplay/AutoDoc' && '1' || '' }}
      AUTODOC_AUTH_WORKER_URL: ${{ vars.AUTODOC_AUTH_WORKER_URL }}
      AUTODOC_MACOS_WHISPER_RUNTIME_ASSET_BASE_URL: ${{ vars.AUTODOC_MACOS_WHISPER_RUNTIME_ASSET_BASE_URL }}
      AUTODOC_WINDOWS_TRANSCRIPTION_ASSET_BASE_URL: ${{ vars.AUTODOC_WINDOWS_TRANSCRIPTION_ASSET_BASE_URL }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Resolve release metadata
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        id: release_meta
        shell: bash
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          raw_tag="$RAW_TAG"
          release_tag="${raw_tag#refs/tags/}"
          release_version="${release_tag#v}"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        shell: pwsh
        run: |
          npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Materialize DigiCert client certificate
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        env:
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.DD_SM_CLIENT_CERT_FILE_B64 }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'Certificate_pkcs12.p12'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64))
          "SM_CLIENT_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup DigiCert signing tools
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        uses: digicert/code-signing-software-trust-action@v1.2.1
        with:
          use-github-caching-service: true
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}

      - name: Expose DigiCert tool paths
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        run: |
          $candidatePaths = @()

          if ($env:LOCALAPPDATA) {
            $candidatePaths += Join-Path $env:LOCALAPPDATA 'Temp\smtools-windows-x64\smctl.exe'
          }

          $smctlCommand = Get-Command smctl.exe -ErrorAction SilentlyContinue
          if ($smctlCommand) {
            $candidatePaths += $smctlCommand.Source
          }

          if ($env:ProgramFiles) {
            $candidatePaths += Join-Path $env:ProgramFiles 'DigiCert\DigiCert One Signing Manager Tools\smctl.exe'
          }
          if (${env:ProgramFiles(x86)}) {
            $candidatePaths += Join-Path ${env:ProgramFiles(x86)} 'DigiCert\DigiCert One Signing Manager Tools\smctl.exe'
          }

          $smctlPath = $candidatePaths |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -Unique -First 1

          if (-not $smctlPath) {
            throw 'smctl.exe was not found on PATH or in the standard DigiCert install locations.'
          }

          Write-Host "Resolved smctl.exe to $smctlPath"
          try {
            $versionInfo = (Get-Item $smctlPath).VersionInfo
            if ($versionInfo.FileVersion) {
              Write-Host "smctl.exe file version: $($versionInfo.FileVersion)"
            }
          } catch {
            Write-Warning "Unable to read smctl.exe file version: $($_.Exception.Message)"
          }

          $smToolsDir = Split-Path -Parent $smctlPath
          $smToolsDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SMCTL_PATH=$smctlPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $signToolCandidates = @()

          $signToolCommand = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if ($signToolCommand) {
            $signToolCandidates += $signToolCommand.Source
          }

          if (${env:ProgramFiles(x86)}) {
            $windowsKitsRoot = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10'
            $signToolCandidates += Join-Path $windowsKitsRoot 'App Certification Kit\signtool.exe'

            $windowsKitsBin = Join-Path $windowsKitsRoot 'bin'
            if (Test-Path $windowsKitsBin) {
              $signToolCandidates += Get-ChildItem -Path $windowsKitsBin -Filter signtool.exe -File -Recurse -ErrorAction SilentlyContinue |
                Sort-Object FullName -Descending |
                Select-Object -ExpandProperty FullName
            }
          }

          $signToolPath = $signToolCandidates |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -Unique -First 1

          if (-not $signToolPath) {
            throw 'signtool.exe was not found on PATH or in the standard Windows SDK locations.'
          }

          Write-Host "Resolved signtool.exe to $signToolPath"
          try {
            $versionInfo = (Get-Item $signToolPath).VersionInfo
            if ($versionInfo.FileVersion) {
              Write-Host "signtool.exe file version: $($versionInfo.FileVersion)"
            }
          } catch {
            Write-Warning "Unable to read signtool.exe file version: $($_.Exception.Message)"
          }

          $signToolDir = Split-Path -Parent $signToolPath
          $signToolDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SIGNTOOL_PATH=$signToolPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check DigiCert signing health
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ secrets.DD_SM_KEYPAIR_ALIAS }}
          SM_LOG_LEVEL: TRACE
        run: |
          & $env:SMCTL_PATH healthcheck
          & $env:SMCTL_PATH windows certsync --keypair-alias=$env:SM_KEYPAIR_ALIAS --store=system

      - name: Build Windows release
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          REQUIRE_WINDOWS_SIGNING: 'true'
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ secrets.DD_SM_KEYPAIR_ALIAS }}
          SM_LOG_LEVEL: TRACE
        run: |
          npm run build
          npx electron-builder --win --publish never "-c.extraMetadata.version=${{ steps.release_meta.outputs.release_version }}"

      - name: Verify Windows signatures
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        run: |
          $files = @(
            'dist\win-unpacked\autodoc.exe'
            'dist\win-unpacked\resources\app.asar.unpacked\native\win-meeting-detector\bin\win-meeting-detector.exe'
            'dist\autodoc-*.exe'
          )

          $resolvedFiles = @()
          foreach ($pattern in $files) {
            $resolvedFiles += Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
          }

          if (-not $resolvedFiles) {
            throw 'No Windows artifacts were found to verify.'
          }

          $failed = $false
          foreach ($file in ($resolvedFiles | Sort-Object FullName -Unique)) {
            $signature = Get-AuthenticodeSignature $file.FullName
            [pscustomobject]@{
              Path = $file.FullName
              Status = $signature.Status
              Signer = $signature.SignerCertificate.Subject
            } | Format-List

            if ($signature.Status -ne 'Valid') {
              $failed = $true
            }
          }

          if ($failed) {
            throw 'One or more Windows artifacts are not Authenticode-signed.'
          }

      - name: Capture DigiCert signing diagnostics
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && failure()
        shell: pwsh
        run: |
          $diagnosticDir = Join-Path $env:RUNNER_TEMP 'digicert-signing-diagnostics'
          New-Item -ItemType Directory -Force -Path $diagnosticDir | Out-Null

          $candidateFiles = @(
            (Join-Path $env:USERPROFILE '.signingmanager\logs\smctl.log')
            (Join-Path $env:USERPROFILE '.signingmanager\logs\smksp.log')
            (Join-Path $env:USERPROFILE '.signingmanager\logs\smcsp.log')
            (Join-Path $env:USERPROFILE '.signingmanager\logs\smpkcs11.log')
          ) | Where-Object { $_ }

          foreach ($candidate in $candidateFiles) {
            if (Test-Path $candidate) {
              Copy-Item -Path $candidate -Destination $diagnosticDir -Force
            }
          }

          [pscustomobject]@{
            SmctlPath = $env:SMCTL_PATH
            SmctlExists = [bool]($env:SMCTL_PATH -and (Test-Path $env:SMCTL_PATH))
            UserProfile = $env:USERPROFILE
            SigningLogDir = Join-Path $env:USERPROFILE '.signingmanager\logs'
          } | ConvertTo-Json | Out-File -FilePath (Join-Path $diagnosticDir 'environment.json') -Encoding utf8

      - name: Upload DigiCert signing diagnostics
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digicert-signing-diagnostics-${{ github.run_number }}
          path: ${{ runner.temp }}/digicert-signing-diagnostics
          if-no-files-found: warn
          retention-days: 14

      - name: Build Windows artifacts
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'branch')
        run: npm run build && npx electron-builder --win --publish never --config.win.forceCodeSigning=false

      - name: Upload Windows artifacts
        if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'branch')) && success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: autodoc-windows-${{ github.run_number }}
          path: |
            dist/*-setup.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows release assets
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-windows-${{ steps.release_meta.outputs.release_tag }}
          path: |
            dist/*-setup.exe
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        github.ref_type == 'tag' &&
        startsWith(github.ref_name, 'v') &&
        needs.build-mac-release.result == 'success'
      }}
    runs-on: ubuntu-latest
    needs:
      - build-mac-release
      # - build-win  # Windows builds disabled — macOS-only for now
    permissions:
      contents: write
      actions: read

    steps:
      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          raw_tag="$RAW_TAG"
          release_tag="${raw_tag#refs/tags/}"
          release_version="${release_tag#v}"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Download macOS release assets
        if: needs.build-mac-release.result == 'success'
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-macos-${{ steps.release_meta.outputs.release_tag }}
          path: release-assets/mac

      # - name: Download Windows release assets
      #   if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && needs.build-win.result == 'success'
      #   uses: actions/download-artifact@v8.0.1
      #   with:
      #     name: release-windows-${{ steps.release_meta.outputs.release_tag }}
      #     path: release-assets/win

      - name: Publish curated GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          assets=(release-assets/mac/*)
          # if [ -d release-assets/win ]; then
          #   assets+=(release-assets/win/*)
          # fi

          if gh release view "$RELEASE_TAG" -R "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber -R "$GH_REPO"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --title "$RELEASE_TAG" -R "$GH_REPO"
          fi

      - name: Remove obsolete blockmap assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          release_json="$(gh api "repos/${GH_REPO}/releases/tags/${RELEASE_TAG}")"
          blockmap_ids="$(jq -r '.assets[] | select(.name | endswith(".blockmap")) | .id' <<<"$release_json")"

          if [ -z "$blockmap_ids" ]; then
            exit 0
          fi

          while IFS= read -r asset_id; do
            gh api --method DELETE "repos/${GH_REPO}/releases/assets/${asset_id}"
          done <<<"$blockmap_ids"
