name: Build & Release

on:
  push:
    branches:
      - main
      - pcPatchAndOnboarding
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Debug macOS signing secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DD_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.DD_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.DD_KEYCHAIN_PASSWORD }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          echo "DD_BUILD_CERTIFICATE_BASE64 set: $( [ -n \"$BUILD_CERTIFICATE_BASE64\" ] && echo 'yes' || echo 'no' )"
          echo "DD_P12_PASSWORD set: $( [ -n \"$P12_PASSWORD\" ] && echo 'yes' || echo 'no' )"
          echo "DD_KEYCHAIN_PASSWORD set: $( [ -n \"$KEYCHAIN_PASSWORD\" ] && echo 'yes' || echo 'no' )"
          echo "APP_STORE_CONNECT_API_KEY_CONTENT set: $( [ -n \"$API_KEY_CONTENT\" ] && echo 'yes' || echo 'no' )"
          echo "APP_STORE_CONNECT_API_KEY_ID set: $( [ -n \"$API_KEY_ID\" ] && echo 'yes' || echo 'no' )"
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID set: $( [ -n \"$API_KEY_ISSUER_ID\" ] && echo 'yes' || echo 'no' )"
          echo "DD_BUILD_CERTIFICATE_BASE64 length: ${#BUILD_CERTIFICATE_BASE64}"
          echo "DD_P12_PASSWORD length: ${#P12_PASSWORD}"
          echo "DD_KEYCHAIN_PASSWORD length: ${#KEYCHAIN_PASSWORD}"
          echo "APP_STORE_CONNECT_API_KEY_CONTENT length: ${#API_KEY_CONTENT}"
          echo "APP_STORE_CONNECT_API_KEY_ID length: ${#API_KEY_ID}"
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID length: ${#API_KEY_ISSUER_ID}"

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DD_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.DD_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.DD_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Prepare notarization API key
        env:
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${API_KEY_ID}.p8"
          printf '%s\n' "$API_KEY_CONTENT" > "$API_KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> $GITHUB_ENV

      - name: Build macOS release
        env:
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          GH_TOKEN: ${{ github.token }}
        run: npm run release:mac

      - name: Upload macOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-macos-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn
          retention-days: 14

  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Build Windows release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run release:win

      - name: Build Windows artifacts
        if: github.ref_type == 'branch'
        run: npm run build:win

      - name: Upload Windows artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-windows-${{ github.ref_name }}
          path: |
            dist/*-setup.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn
          retention-days: 14
