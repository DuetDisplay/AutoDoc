name: Build & Release

on:
  push:
    branches:
      - main
      - fixSVGPNGIssue
      - 'codex/**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      AUTODOC_SENTRY_DSN: ${{ secrets.AUTODOC_SENTRY_DSN }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Install Apple certificate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DD_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.DD_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.DD_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build macOS release (signed + notarized)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_ID: ${{ secrets.DD_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DD_APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DD_APPLE_TEAM }}
        run: npm run build:mac

      - name: Build macOS artifacts (unsigned)
        if: github.ref_type == 'branch'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build && npx electron-builder --mac --publish never -c.mac.notarize=false

      - name: Upload macOS artifacts
        if: github.ref_type == 'branch' && success()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-macos-${{ github.ref_type }}-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS release assets
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  build-win:
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      AUTODOC_SENTRY_DSN: ${{ secrets.AUTODOC_SENTRY_DSN }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap tests
        run: npm run test:main:run -- src/main/services/__tests__/whisper-manager.test.ts

      - name: Materialize DigiCert client certificate
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.DD_SM_CLIENT_CERT_FILE_B64 }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'Certificate_pkcs12.p12'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64))
          "SM_CLIENT_CERT_FILE=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup DigiCert signing tools
        if: startsWith(github.ref, 'refs/tags/')
        uses: digicert/ssm-code-signing@v1.0.0
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}

      - name: Expose DigiCert tool paths
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $smToolsDir = Join-Path $env:LOCALAPPDATA 'Temp\smtools-windows-x64'
          $smctlPath = Join-Path $smToolsDir 'smctl.exe'

          if (-not (Test-Path $smctlPath)) {
            throw "smctl.exe was not found at $smctlPath"
          }

          $smToolsDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SMCTL_PATH=$smctlPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check DigiCert signing health
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ secrets.DD_SM_KEYPAIR_ALIAS }}
        run: |
          & $env:SMCTL_PATH healthcheck
          & $env:SMCTL_PATH windows certsync --keypair-alias=$env:SM_KEYPAIR_ALIAS --store=system

      - name: Build Windows release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          REQUIRE_WINDOWS_SIGNING: 'true'
          SM_HOST: https://clientauth.one.digicert.com
          SM_API_KEY: ${{ secrets.DD_SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DD_SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ secrets.DD_SM_KEYPAIR_ALIAS }}
        run: npm run build:win

      - name: Verify Windows signatures
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $files = @(
            'dist\win-unpacked\autodoc.exe'
            'dist\win-unpacked\resources\app.asar.unpacked\native\win-meeting-detector\bin\win-meeting-detector.exe'
            'dist\autodoc-*.exe'
          )

          $resolvedFiles = @()
          foreach ($pattern in $files) {
            $resolvedFiles += Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
          }

          if (-not $resolvedFiles) {
            throw 'No Windows artifacts were found to verify.'
          }

          $failed = $false
          foreach ($file in ($resolvedFiles | Sort-Object FullName -Unique)) {
            $signature = Get-AuthenticodeSignature $file.FullName
            [pscustomobject]@{
              Path = $file.FullName
              Status = $signature.Status
              Signer = $signature.SignerCertificate.Subject
            } | Format-List

            if ($signature.Status -ne 'Valid') {
              $failed = $true
            }
          }

          if ($failed) {
            throw 'One or more Windows artifacts are not Authenticode-signed.'
          }

      - name: Build Windows artifacts
        if: github.ref_type == 'branch'
        run: npm run build && npx electron-builder --win --publish never -c.win.forceCodeSigning=false

      - name: Upload Windows artifacts
        if: github.ref_type == 'branch' && success()
        uses: actions/upload-artifact@v4
        with:
          name: autodoc-windows-${{ github.ref_type }}-${{ github.run_number }}
          path: |
            dist/*-setup.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows release assets
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ github.ref_name }}
          path: |
            dist/*-setup.exe
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win
    permissions:
      contents: write

    steps:
      - name: Download macOS release assets
        uses: actions/download-artifact@v4
        with:
          name: release-macos-${{ github.ref_name }}
          path: release-assets/mac

      - name: Download Windows release assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows-${{ github.ref_name }}
          path: release-assets/win

      - name: Publish curated GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" -R "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/mac/* release-assets/win/* --clobber -R "$GH_REPO"
          else
            gh release create "$tag" release-assets/mac/* release-assets/win/* --verify-tag --title "$tag" -R "$GH_REPO"
          fi

      - name: Remove obsolete blockmap assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          release_json="$(gh api "repos/${GH_REPO}/releases/tags/${tag}")"
          blockmap_ids="$(jq -r '.assets[] | select(.name | endswith(".blockmap")) | .id' <<<"$release_json")"

          if [ -z "$blockmap_ids" ]; then
            exit 0
          fi

          while IFS= read -r asset_id; do
            gh api --method DELETE "repos/${GH_REPO}/releases/assets/${asset_id}"
          done <<<"$blockmap_ids"
