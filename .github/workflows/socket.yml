name: Socket Security

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - worker/package.json
      - worker/package-lock.json
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - worker/package.json
      - worker/package-lock.json
  schedule:
    # 03:00 UTC is 11:00 PM in America/New_York during daylight saving time.
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: socket-scan-${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  socket-security:
    name: Socket Security
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Socket's PR diff analysis needs at least one parent commit available.
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Socket API key is configured
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
        run: |
          if [ -z "$SOCKET_SECURITY_API_KEY" ]; then
            echo "Missing GitHub Actions secret: SOCKET_SECURITY_API_KEY"
            echo "Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Run Socket scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi

          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --scm github \
            --pr-number "$PR_NUMBER"
