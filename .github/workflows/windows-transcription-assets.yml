name: Windows Transcription Assets

on:
  push:
    branches:
      - windowsPerformanceFix
    paths:
      - '.github/workflows/windows-transcription-assets.yml'
      - 'scripts/prepare-windows-transcription-assets.js'
      - 'resources/windows-transcription-manifest.json'
      - 'package.json'
  workflow_dispatch:
    inputs:
      asset_tag:
        description: Versioned release tag for the transcription asset bundle.
        required: true
        default: windows-transcription-v1
        type: string
      publish_assets:
        description: Upload generated assets to the GitHub release.
        required: true
        default: false
        type: boolean

jobs:
  build-windows-transcription-assets:
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      ASSET_TAG: ${{ github.event_name == 'push' && 'windows-transcription-v1-branch-test' || github.event.inputs.asset_tag || 'windows-transcription-v1' }}
      AUTODOC_WINDOWS_TRANSCRIPTION_RELEASE_TAG: ${{ github.event_name == 'push' && 'windows-transcription-v1-branch-test' || github.event.inputs.asset_tag || 'windows-transcription-v1' }}
      AUTODOC_PYTHON_BUNDLE_TARGETS: win32-x64
      PIP_CACHE_DIR: ${{ github.workspace }}\.benchmarks\pip-cache
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify manifest tag
        if: ${{ github.event_name != 'push' }}
        shell: pwsh
        run: |
          $manifest = Get-Content -LiteralPath resources/windows-transcription-manifest.json -Raw | ConvertFrom-Json
          if ($manifest.releaseTag -ne $env:ASSET_TAG) {
            throw "Manifest releaseTag '$($manifest.releaseTag)' does not match workflow asset tag '$env:ASSET_TAG'."
          }
          if ($manifest.artifactBaseUrl -notmatch [regex]::Escape("/$env:ASSET_TAG")) {
            throw "Manifest artifactBaseUrl '$($manifest.artifactBaseUrl)' does not point at '$env:ASSET_TAG'."
          }

      - name: Restore Python archive cache
        uses: actions/cache@v4
        with:
          path: vendor/python-runtime
          key: python-runtime-win32-x64-3.11.15-20260414

      - name: Restore asset build caches
        uses: actions/cache@v4
        with:
          path: |
            .benchmarks/faster-whisper-models
            .benchmarks/pip-cache
          key: windows-transcription-assets-${{ env.ASSET_TAG }}-${{ hashFiles('scripts/prepare-windows-transcription-assets.js') }}
          restore-keys: |
            windows-transcription-assets-${{ env.ASSET_TAG }}-
            windows-transcription-assets-

      - name: Prepare managed Python archive
        run: npm run prepare:python-runtime

      - name: Build Windows transcription assets
        run: npm run prepare:windows-transcription-assets

      - name: Verify committed manifest matches generated assets
        if: ${{ github.event_name != 'push' }}
        shell: pwsh
        run: |
          git diff --exit-code -- resources/windows-transcription-manifest.json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-transcription-assets-${{ env.ASSET_TAG }}
          path: |
            .benchmarks/windows-transcription-assets/${{ env.ASSET_TAG }}/*.zip
            .benchmarks/windows-transcription-assets/${{ env.ASSET_TAG }}/SHA256SUMS.md
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release assets
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_assets) }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:ASSET_TAG
          $assetDir = Join-Path $PWD ".benchmarks/windows-transcription-assets/$tag"
          $releaseTitle = if ($env:GITHUB_EVENT_NAME -eq 'push') {
            "Windows transcription assets branch upload test"
          } else {
            "Windows transcription assets $tag"
          }
          $releaseNotes = if ($env:GITHUB_EVENT_NAME -eq 'push') {
            "Temporary branch test upload for the Windows transcription asset workflow. Do not use as a production asset bundle."
          } else {
            "Versioned faster-whisper runtime and model assets for Windows onboarding."
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo $env:GITHUB_REPOSITORY `
              --title $releaseTitle `
              --notes $releaseNotes `
              --prerelease `
              --target $env:GITHUB_SHA
          }

          gh release upload $tag `
            (Join-Path $assetDir 'faster-whisper-runtime-cpu-win-x64.zip') `
            (Join-Path $assetDir 'faster-whisper-runtime-cuda-win-x64.zip') `
            (Join-Path $assetDir 'faster-whisper-small-en-ct2-int8.zip') `
            (Join-Path $assetDir 'faster-whisper-distil-large-v3-ct2.zip') `
            (Join-Path $assetDir 'SHA256SUMS.md') `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
