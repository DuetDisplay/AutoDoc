name: PR Regression

on:
  pull_request:
  workflow_dispatch:

jobs:
  pr-onboarding:
    name: PR Onboarding
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:pr:onboarding

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-onboarding-playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  pr-recording:
    name: PR Recording
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:pr:recording

  pr-processing:
    name: PR Processing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:pr:processing

  pr-ai:
    name: PR AI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:pr:ai

  pr-settings:
    name: PR Settings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run test:pr:settings
