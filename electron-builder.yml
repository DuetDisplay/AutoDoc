appId: com.kairos.autodoc
productName: AutoDoc
directories:
  buildResources: build
files:
  - 'package.json'
  - 'out/**/*'
  - 'node_modules/**/*'
  - 'resources/diarize.py'
  - 'resources/icon.png'
  - 'resources/trayTemplate.png'
  - 'resources/trayTemplate@2x.png'
  - 'resources/trayRecording.png'
  - 'resources/trayRecording@2x.png'
  - 'native/**/bin/**/*'
  - '!**/__tests__/**'
  - '!**/*.{map,md,markdown,tsbuildinfo}'
  - '!**/.DS_Store'
asarUnpack:
  - 'resources/**'
  - 'native/**'
win:
  target:
    - nsis
  executableName: autodoc
  icon: build/icon.ico
  forceCodeSigning: true
  signtoolOptions:
    sign: ./scripts/windows-sign.js
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - dmg
    - zip
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
  backgroundColor: '#ffffff'
  icon: null
  window:
    width: 540
    height: 380
  writeUpdateInfo: false
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: DuetDisplay
  repo: AutoDoc-Local
  releaseType: release
